name: Daily World News Email

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install requests
        run: pip install requests

      - name: Fetch and send news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
