name: Daily World News Email

on:
  schedule:
    # 11 AM IST = 5:30 AM UTC
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Send World News
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies and run script
        run: |
          pip install requests
          python -c "
import requests
import json
from datetime import datetime, timedelta
import smtplib
from email.mime.text import MIMEText
from email.mime.multipart import MIMEMultipart

# NewsAPI setup
API_KEY = '${{ secrets.NEWS_API_KEY }}'
EMAIL = '${{ secrets.EMAIL_ADDRESS }}'

# Calculate time range (7 AM to 11 AM IST, previous day to current day)
# IST is UTC+5:30
now = datetime.utcnow() + timedelta(hours=5, minutes=30)
start_time = (now - timedelta(days=1)).replace(hour=7, minute=0, second=0, microsecond=0)
end_time = now.replace(hour=11, minute=0, second=0, microsecond=0)

# Format for API (ISO 8601, convert back to UTC)
start_utc = (start_time - timedelta(hours=5, minutes=30)).isoformat()
end_utc = (end_time - timedelta(hours=5, minutes=30)).isoformat()

# Fetch news
url = 'https://newsapi.org/v2/everything'
params = {
    'q': 'world',
    'sortBy': 'publishedAt',
    'language': 'en',
    'from': start_utc.split('T')[0],
    'to': end_utc.split('T')[0],
    'apiKey': API_KEY,
    'pageSize': 15
}

response = requests.get(url, params=params)
articles = response.json().get('articles', [])

# Build email
subject = f'World News Daily - {now.strftime(\"%B %d, %Y\")}'
html_body = '<html><body>'
html_body += f'<h2>World News - {now.strftime(\"%B %d, %Y\")}</h2>'
html_body += '<p><em>News from 7 AM to 11 AM IST</em></p>'
html_body += '<hr>'

if articles:
    for idx, article in enumerate(articles[:15], 1):
        html_body += f'''
        <div style=\"margin: 20px 0; padding: 15px; border-left: 4px solid #007bff;\">
            <h3 style=\"margin: 0 0 10px 0; color: #333;\">{idx}. {article['title']}</h3>
            <p style=\"margin: 10px 0; color: #666;\">{article['description']}</p>
            <p style=\"margin: 10px 0;\"><a href=\"{article['url']}\" style=\"color: #007bff; text-decoration: none;\">Read full article →</a></p>
            <small style=\"color: #999;\">{article['source']['name']} | {article['publishedAt'][:10]}</small>
        </div>
        '''
else:
    html_body += '<p>No news articles found for this time period.</p>'

html_body += '<hr><p style=\"font-size: 12px; color: #999;\">This is an automated email from your Daily News Bot.</p>'
html_body += '</body></html>'

print(f'Subject: {subject}')
print(f'To: {EMAIL}')
print(f'Articles found: {len(articles)}')
print('Email body prepared successfully')
print('✓ In production, this would send via SMTP')
"
