name: Daily World News Email

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch news and print
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          EMAIL: ${{ secrets.EMAIL_ADDRESS }}
        run: python3 fetch_news.py
