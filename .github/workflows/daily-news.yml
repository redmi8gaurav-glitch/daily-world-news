name: Daily World News Email

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install requests
        run: pip install requests

      - name: Fetch and send news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          EMAIL: ${{ secrets.EMAIL_ADDRESS }}
        run: |
          python3 << 'EOF'
import requests
from datetime import datetime, timedelta
import os

API_KEY = os.getenv('NEWS_API_KEY')
EMAIL = os.getenv('EMAIL')

now = datetime.utcnow() + timedelta(hours=5, minutes=30)
start_time = now.replace(hour=7, minute=0, second=0, microsecond=0)
end_time = now

start_utc = (start_time - timedelta(hours=5, minutes=30)).isoformat()
end_utc = (end_time - timedelta(hours=5, minutes=30)).isoformat()

url = 'https://newsapi.org/v2/everything'
params = {
    'q': 'world news',
    'sortBy': 'publishedAt',
    'language': 'en',
    'from': start_utc.split('T')[0],
    'to': end_utc.split('T')[0],
    'apiKey': API_KEY,
    'pageSize': 15
}

response = requests.get(url, params=params)
data = response.json()

if data.get('status') == 'ok':
    articles = data.get('articles', [])
    print(f'✓ Fetched {len(articles)} articles')
    print(f'Time: {start_time.strftime("%Y-%m-%d %H:%M IST")} to {end_time.strftime("%Y-%m-%d %H:%M IST")}')
    for idx, article in enumerate(articles[:5], 1):
        print(f'{idx}. {article["title"][:60]}')
else:
    print(f'Error: {data.get("message", "Unknown")}')

print(f'Email: {EMAIL}')
EOF
